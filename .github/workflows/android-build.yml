name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build (Gradle)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}-${{ hashFiles('**/*.gradle*') }}

      - name: Set up Android SDK and components
        uses: android-actions/setup-android@v2
        with:
          api-level: 35
          build-tools: 35.0.0
          platform-tools: true
          cmake: false
          ndk: ""

      - name: Ensure SDK components and accept licenses
        run: |
          SDK_ROOT="/usr/local/lib/android/sdk"
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          export ANDROID_HOME="$SDK_ROOT"
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$SDK_ROOT/platform-tools:$PATH"
          set -x
          # Install required packages (non-interactive)
          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --install "platform-tools" "platforms;android-35" "build-tools;35.0.0" || true
          # Accept all licenses
          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Grant execute to gradlew
        run: chmod +x gradlew

      - name: Verify Gradle wrapper is used
        run: |
          echo "Using Gradle wrapper at ./gradlew"
          ./gradlew --version

      - name: Build APK (release)
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          body: Automated release from GitHub Actions
          draft: false
          prerelease: false

      - name: Upload APK to Release
        if: steps.create_release.outputs.upload_url != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/release/app-release.apk
          asset_name: app-release.apk
          asset_content_type: application/vnd.android.package-archive
