name: LingoCloud Combined Build & Release

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: 35.0.0

      - name: Ensure SDK paths
        run: |
          echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "${ANDROID_HOME}/platform-tools" >> $GITHUB_PATH
          echo "${ANDROID_HOME}/build-tools/35.0.0" >> $GITHUB_PATH

      - name: Grant execute to gradlew
        run: chmod +x gradlew

      # 1. Build the APK
      - name: Build APK (Release)
        run: ./gradlew assembleRelease --no-daemon

      # 2. Sign the APK (Fixes the 29.0.3 error)
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      # 3. Build JAR/Other Artifacts
      - name: Build Other Artifacts
        run: ./gradlew build -x test

      # 4. Upload Artifacts (The Zip)
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LingoCloud-Package
          path: |
            **/build/libs/*.jar
            ${{ steps.sign_app.outputs.signedReleaseFile }}

      # 5. Create GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', github.run_number) }}
          name: Release ${{ github.ref_name || github.run_number }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
            **/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Sign the APK
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 3. Build JAR/Other Artifacts
      

      # 4. Upload Artifacts (The Zip)
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LingoCloud-Package
          path: |
            **/build/libs/*.jar
            ${{ steps.sign_app.outputs.signedReleaseFile }}

      # 5. Create GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', github.run_number) }}
          name: Release ${{ github.ref_name || github.run_number }}
          files: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
            **/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.MYGITHUB_TOKEN }}
