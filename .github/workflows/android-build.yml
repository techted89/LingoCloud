name: Android Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. Build the APK
      - name: Build APK (Release)
        run: ./gradlew assembleRelease --no-daemon

      # 2. Sign the APK
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/build/outputs/apk/release/signingKey.jks

      - name: Sign APK
        id: sign_app
        run: |
          /usr/local/lib/android/sdk/build-tools/35.0.0/apksigner sign \
            --ks app/build/outputs/apk/release/signingKey.jks \
            --ks-key-alias ${{ secrets.ALIAS }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out app/build/outputs/apk/release/app-release-signed.apk \
                  app/build/outputs/apk/release/app-release-unsigned.apk
      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LingoCloud-Signed-APK
          path: app/build/outputs/apk/release/app-release-signed.apk

      # 3. Build JAR/Other Artifacts
      - name: Build Other Artifacts
        run: ./gradlew build -x test

      # 4. Upload All Build Artifacts
      - name: Upload Build Package
        uses: actions/upload-artifact@v4
        with:
          name: LingoCloud-Complete-Package
          path: |
            **/build/libs/*.jar
            app/build/outputs/apk/release/app-release-signed.apk

      # 5. Create GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', github.run_number) }}
          name: Release ${{ github.ref_name || github.run_number }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release-signed.apk
            **/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
