name: Jules AI Automation Trigger

on:
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  notify-vps:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.comment.user.login, 'bot') || 
      contains(github.event.comment.user.login, 'rabbit') ||
      contains(github.event.comment.body, '@jules fix')
    
    steps:
      - name: Send Webhook to VPS
        run: |
          curl -X POST http://74.208.167.101:8080/webhook \
          -H "Content-Type: application/json" \
          -H "X-GitHub-Event: ${{ github.event_name == 'issue_comment' && 'issue_comment' || 'pull_request_review_comment' }}" \
          -d '${{ toJson(github.event) }}'
