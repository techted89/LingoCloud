name: Notify Jules of AI Reviews

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  notify_jules:
    name: Forward Bot Comments to Jules
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    
    steps:
      - name: Parse and Forward Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 1. Identify the sender
            const sender = context.payload.sender.login.toLowerCase();
            
            // Note: You may need to adjust these strings to match the exact GitHub bot usernames.
            // Often bots have "[bot]" appended to their names, e.g., "coderabbitai[bot]".
            const isCodeRabbit = sender.includes('coderabbit');
            const isGemini = sender.includes('gemini');

            if (!isCodeRabbit && !isGemini) {
              console.log(`Sender ${context.payload.sender.login} is not an AI bot. Skipping.`);
              return;
            }

            // 2. Ensure this is on a Pull Request (issue_comment triggers on standard issues too)
            if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
              console.log('This comment was on a standard issue, not a pull request. Skipping.');
              return;
            }

            // 3. Extract the comment body, PR number, and URL based on the event type
            let body = '';
            let prNumber = '';
            let commentUrl = '';

            if (context.eventName === 'issue_comment') {
              body = context.payload.comment.body;
              prNumber = context.payload.issue.number;
              commentUrl = context.payload.comment.html_url;
            } else if (context.eventName === 'pull_request_review_comment') {
              body = context.payload.comment.body;
              prNumber = context.payload.pull_request.number;
              commentUrl = context.payload.comment.html_url;
            } else if (context.eventName === 'pull_request_review') {
              body = context.payload.review.body;
              prNumber = context.payload.pull_request.number;
              commentUrl = context.payload.review.html_url;
              
              // Formal reviews sometimes have no body text (just approvals/changes requested)
              if (!body) {
                 console.log('Review event has no text body. Skipping.');
                 return;
              }
            }

            if (!body) return;

            // 4. Format the new comment for @jules
            const mention = '@jules';
            // Prefix every line with '> ' to create a markdown blockquote
            const blockquotedBody = body.split('\n').map(line => `> ${line}`).join('\n');
            
            const newComment = `${mention} - New AI Review from **${context.payload.sender.login}**:\n\n${blockquotedBody}\n\n[View original comment](${commentUrl})`;

            // 5. Post the new comment to the PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: newComment
            });
            
