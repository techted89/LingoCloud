name: Jules AI Automation Trigger

on:
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  notify-vps:
    runs-on: ubuntu-latest
    if: |
      github.event.comment.author_association == 'OWNER' ||
      github.event.comment.author_association == 'MEMBER' ||
      github.event.comment.author_association == 'COLLABORATOR'

    steps:
      - name: Send Webhook to VPS
        env:
          EVENT_JSON: ${{ toJson(github.event) }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          # Write payload to a temporary file to avoid shell expansion issues
          cat << EOF > payload.json
          $EVENT_JSON
          EOF

          # Generate HMAC-SHA256 signature
          SIGNATURE=$(openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" payload.json | awk '{print $2}')

          curl -X POST "$WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
          -H "X-GitHub-Event: ${{ github.event_name == 'issue_comment' && 'issue_comment' || 'pull_request_review_comment' }}" \
          --data-binary @payload.json
